baseURL: https://kubecloudscaler.cloud
languageCode: en-us
title: kubecloudscaler

module:
  imports:
    - path: github.com/imfing/hextra
params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: /favicon.svg
      width: 40
      height: 40
  theme:
    # light | dark | system
    default: system
    displayToggle: true
menu:
  main:
    - name: Documentation
      pageRef: /docs
      weight: 1
      params:
        icon: book-open
    - name: GitHub
      weight: 5
      url: "https://github.com/kubecloudscaler/kubecloudscaler"
      params:
        icon: github
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableInlineShortcodes: true
